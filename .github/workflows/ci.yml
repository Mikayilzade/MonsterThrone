name: World Laboratory tests
on:
  push:
    branches: [main, "agent/**"]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: npm run test:scenarios
      - uses: actions/upload-artifact@v4
        with:
          name: v0.3-simulation-reports
          path: reports/
